<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* {margin:0;padding:0;box-sizing:border-box;}
body {width:280px;background:#1a1a2e;color:#fff;font-family:Segoe UI;padding:15px;}
.header {display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;padding-bottom:10px;border-bottom:1px solid #0f3460;}
.header h1 {color:#00d9ff;font-size:16px;}
.btn {width:100%;padding:12px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;color:#fff;font-size:13px;margin-bottom:10px;transition:all 0.3s;}
.btn:active {transform:scale(0.98);}
.btn-inject {background:#e94560;}
.btn-inject.on {background:#4ade80;color:#000;}
.btn-panel {background:#0f3460;}
.btn-panel.active {background:#4ade80;color:#000;}
.status {font-size:11px;color:#888;margin-top:10px;padding:8px;background:rgba(255,255,255,0.05);border-radius:6px;min-height:40px;}
</style>
</head>
<body>
<div class="header">
  <h1>Game Monitor</h1>
  <span style="color:#4ade80;font-size:12px;" id="ver">v1.11</span>
</div>

<button class="btn btn-inject" id="btnInject">INJECT MONITOR</button>
<button class="btn btn-panel" id="btnPanel">SHOW PANEL</button>

<div id="status" class="status">Ready. Click INJECT first!</div>

<script src="popup.js"></script>
</body>
</html>
